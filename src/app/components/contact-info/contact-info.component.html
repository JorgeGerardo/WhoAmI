<main class="container py-5">
    <app-navbar />

    <article class="contact-section container py-5">
        <section class="contact-card mx-auto text-center">

            <span class="contact-badge mb-3">
            {{ 'contact.badge' | translate }}
            </span>

            <h2 class="fw-bold mb-3">
            {{ 'contact.title' | translate }}
            </h2>

            <p class="contact-description mb-5">
            {{ 'contact.description' | translate }}
            </p>

            <div class="contact-links">

            <a
                href="mailto:yourmail@example.com"
                class="contact-link">
                <i class="bi bi-envelope-fill"></i>

                {{ email }}
            </a>

            <a
                href="https://www.linkedin.com/in/jorge-saul-gerardo-rojo-8a8170264"
                target="_blank"
                class="contact-link">
                <i class="bi bi-linkedin"></i>

                LinkedIn
            </a>

            </div>

        </section>
    </article>
</main>
